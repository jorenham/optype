name: mypy_primer comment

permissions:
  actions: read # download artifacts from the triggering workflow run
  contents: read

on: # zizmor: ignore[dangerous-triggers] -- workflow_run is needed to post PR comments from fork PRs
  workflow_run:
    workflows: [mypy_primer run]
    types: [completed]

jobs:
  comment:
    name: Comment
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      pull-requests: write # post or update the mypy_primer results comment

    concurrency:
      group: ${{ github.workflow }}-${{ github.event.workflow_run.id }}
      cancel-in-progress: true

    steps:
      - uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
        name: download pr-number
        with:
          name: pr-number
          path: ${{ runner.temp }}/artifacts
          run_id: ${{ github.event.workflow_run.id }}

      - name: parse pr-number
        id: pr-number
        run: |
          if [[ -f $RUNNER_TEMP/artifacts/pr-number ]]
          then
            echo "pr-number=$(<$RUNNER_TEMP/artifacts/pr-number)" >> "$GITHUB_OUTPUT"
          fi

      - uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
        name: download mypy_primer.diff
        id: download-mypy_primer-diff
        if: ${{ steps.pr-number.outputs.pr-number }}
        with:
          name: mypy_primer-diff
          path: ${{ runner.temp }}/artifacts
          run_id: ${{ github.event.workflow_run.id }}

      - name: generate comment content
        id: generate-comment
        if: ${{ steps.download-mypy_primer-diff.outputs.found_artifact == 'true' }}
        run: |
          # Guard against malicious mypy_primer results that symlink to a secret
          # file on this runner
          if [[ -L $RUNNER_TEMP/artifacts/mypy_primer.diff ]]
          then
              echo "Error: mypy_primer.diff cannot be a symlink"
              exit 1
          fi

          # Note this identifier is used to find the comment to update on
          # subsequent runs
          echo '<!-- generated-comment mypy_primer -->' >> comment.md

          echo '## `mypy_primer` results' >> comment.md
          if [ -s "$RUNNER_TEMP/artifacts/mypy_primer.diff" ]; then
            # Keep the comment body under GitHub's comment limit (~65k chars).
            DIFF_MAX=60000

            echo '<details>' >> comment.md
            echo '<summary>⚠️ Changes were detected when running mypy on open source projects</summary>' >> comment.md
            echo '' >> comment.md
            echo '```diff' >> comment.md
            head -c "$DIFF_MAX" $RUNNER_TEMP/artifacts/mypy_primer.diff >> comment.md
            if [ "$(wc -c < $RUNNER_TEMP/artifacts/mypy_primer.diff)" -gt "$DIFF_MAX" ]; then
              echo '' >> comment.md
              echo '... (truncated)' >> comment.md
            fi
            echo '```' >> comment.md
            echo '</details>' >> comment.md
          else
            echo '✅ No ecosystem changes detected' >> comment.md
          fi

          echo 'comment<<EOF' >> "$GITHUB_OUTPUT"
          cat comment.md >> "$GITHUB_OUTPUT"
          echo 'EOF' >> "$GITHUB_OUTPUT"

      - name: create or update comment
        if: ${{ steps.generate-comment.outcome == 'success' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr-number.outputs.pr-number }}
        run: |
          # Find existing comment by the bot containing the marker
          COMMENT_ID=$(
            gh api \
              "repos/$GITHUB_REPOSITORY/issues/${PR_NUMBER}/comments" \
              --paginate \
              --jq '.[] | select(.user.login == "github-actions[bot]") | select(.body | contains("<!-- generated-comment mypy_primer -->")) | .id' \
            | head -n1
          )

          if [[ -n "$COMMENT_ID" ]]; then
            # Update existing comment
            gh api \
              --method PATCH \
              "repos/$GITHUB_REPOSITORY/issues/comments/${COMMENT_ID}" \
              --field "body=@comment.md"
          else
            # Create new comment
            gh pr comment "${PR_NUMBER}" \
              --repo "$GITHUB_REPOSITORY" \
              --body-file comment.md
          fi
