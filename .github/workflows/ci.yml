name: CI
permissions: {}

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  UV_LOCKED: 1
  NPTC_BUILD: 20251206

jobs:
  lint:
    name: lint
    timeout-minutes: 5
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: typos
        uses: crate-ci/typos@aca895bf05aec0cb7dffa6f94495e923224d9f17 # v1.46.2

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.14"

      - name: dprint
        run: uv run dprint check

      # the `scientific-python/repo-review` action (v1.0.3) internally uses an unpinned
      # `actions/setup-python@v6`, so we use `uvx` instead.
      - name: repo-review
        run: >
          uvx --from='repo-review[cli]' --with=sp-repo-review
          repo-review --format html --stderr rich .
          >> $GITHUB_STEP_SUMMARY

      - name: ruff check
        run: uv run ruff check --output-format=github

      - name: ruff format
        run: uv run ruff format --check

      - name: basedpyright --verifytypes
        run: uv run basedpyright --ignoreexternal --verifytypes optype

  typecheck:
    name: typecheck
    timeout-minutes: 5
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        np: ["1.26", "2.0", "2.1", "2.2", "2.3", "2.4"]
        py: ["3.12", "3.13"]
        exclude:
          - py: "3.13"
            np: "1.26"
          - py: "3.13"
            np: "2.0"
        include:
          - py: "3.14"
            np: "2.3"
          - py: "3.14"
            np: "2.4"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          activate-environment: true
          python-version: ${{ matrix.py }}

      - name: uv sync
        run: uv sync --no-editable

      - name: install deps
        run: uv pip install --exact --group type "numpy==$NP_VERSION.*" .
        env:
          NP_VERSION: ${{ matrix.np }}

      - name: ty
        run: ty check

      - name: pyrefly
        run: pyrefly check

      - name: basedpyright
        run: basedpyright

      # NOTE: mypy ignores `uv run --with=...` (and `--isolated` does not help)
      - name: mypy
        run: mypy --no-incremental --cache-dir=/dev/null .

  test:
    name: test
    timeout-minutes: 10
    runs-on: ${{ matrix.os }}-latest
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu, windows]
        py: ["3.12", "3.13", "3.14"]
        np: ["1.26", "2.0", "2.3", "2.4"]
        exclude:
          - py: "3.13"
            np: "1.26"
          - py: "3.13"
            np: "2.0"
          - py: "3.14"
            np: "1.26"
          - py: "3.14"
            np: "2.0"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.py }}
          activate-environment: true

      - name: install dependencies
        shell: bash
        run: uv pip install --exact --group test "numpy==$NP_VERSION.*" .
        env:
          NP_VERSION: ${{ matrix.np }}

      - name: pytest
        run: pytest
