name: update dprint plugins

on:
  schedule:
    # every Monday at 08:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

env:
  UV_LOCKED: 1

jobs:
  update:
    name: update dprint plugins
    if: github.repository == 'scipy/scipy-stubs'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: write # to push the update branch
      pull-requests: write # to create the pull request

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      # this prevents dprint from printing "compiling ..." messages, which would
      # otherwise be included in the PR body, so we can ignore errors here
      - name: compile dprint plugins
        run: uv run --only-group=lint dprint check
        continue-on-error: true

      - name: dprint config update
        id: update
        run: |
          output=$(uv run --quiet --only-group=lint dprint config update --yes 2>&1)
          echo "$output"
          {
            echo "output<<EOF"
            echo "$output"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: create pull request
        env:
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
          UPDATE_OUTPUT: ${{ steps.update.outputs.output }}
        run: |
          BRANCH="github-actions-bot/dprint-config-update-${REF_NAME}"

          gh auth setup-git
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit --signoff -m "update dprint plugins"
          git push --force-with-lease origin "$BRANCH"

          BODY=$(cat <<EOF
          Automated update of [dprint][1] plugins via \`dprint config update\`.

          \`\`\`
          ${UPDATE_OUTPUT}
          \`\`\`

          [1]: https://dprint.dev
          EOF
          )

          # create or update the PR
          if gh pr view "$BRANCH" --json number &>/dev/null; then
            gh pr edit "$BRANCH" \
              --title "update dprint plugins" \
              --body "$BODY"
          else
            gh pr create \
              --base "$REF_NAME" \
              --head "$BRANCH" \
              --title "update dprint plugins" \
              --body "$BODY" \
              --label "tool: dprint" \
              --label "topic: dependencies"
          fi
